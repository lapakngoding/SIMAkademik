{% extends "dashboard/base.html" %}

{% block content %}
<div class="content-header">
    <div class="container-fluid">
        <h1 class="m-0">Kelola Berita/Konten</h1>
    </div>
</div>

<section class="content">
    <div class="container-fluid">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Tambah Berita Baru</h3>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {{ form.media }}

                    <div class="form-group">
                        <label>Judul Berita</label>
                        {{ form.title }}
                    </div>

                    <div class="form-group">
                        <label>Isi Konten</label>
                        {{ form.content }}
                    </div>

                    <div class="form-group">
                        <label>Waktu Publikasi</label>
                        {{ form.published_at }}
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Simpan Konten</button>
                        <a href="{% url 'accounts:post_list' %}" class="btn btn-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
