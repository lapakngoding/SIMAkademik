{% extends 'website/base.html' %}

{% block title %}PPDB - SIM Sekolah{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-primary text-white p-4">
                    <h3 class="mb-0 fw-bold"><i class="fas fa-user-edit me-2"></i>Formulir Pendaftaran Siswa Baru</h3>
                    <p class="mb-0 opacity-75">Silakan isi data calon siswa dengan lengkap dan benar.</p>
                </div>
                <div class="card-body p-5">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <h5 class="text-primary mb-4 border-bottom pb-2">Data Pribadi</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-8">
                                <label class="form-label fw-bold">Nama Lengkap</label>
                                <input type="text" name="full_name" class="form-control" placeholder="Nama sesuai ijazah/akta" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Jenis Kelamin</label>
                                <select name="gender" class="form-select" required>
                                    <option value="" selected disabled>Pilih...</option>
                                    <option value="L">Laki-laki</option>
                                    <option value="P">Perempuan</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-bold">NISN</label>
                                <input type="text" name="nisn" class="form-control" placeholder="10 digit nomor induk" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">NIK (No. KTP/KK)</label>
                                <input type="text" name="nik" class="form-control" placeholder="16 digit nomor induk kependudukan" required>
                            </div>
                        </div>

                        <h5 class="text-primary mb-4 border-bottom pb-2">Kelahiran & Kontak</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Nama Ibu</label>
                                <input type="text" name="nama_ibu_kandung" class="form-control" placeholder="Nama Ibu Kandung / Wali" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Tempat Lahir</label>
                                <input type="text" name="tempat_lahir" class="form-control" placeholder="Kota kelahiran" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Tanggal Lahir</label>
                                <input type="date" name="birth_date" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Email Aktif</label>
                                <input type="email" name="email" class="form-control" placeholder="contoh@gmail.com" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">No. WhatsApp</label>
                                <input type="text" name="phone_number" class="form-control" placeholder="08xxxxxxxx" required>
                            </div>
                        </div>

                        <h5 class="text-primary mb-4 border-bottom pb-2">Data Sekolah Asal</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Nama Sekolah Asal</label>
                                <input type="text" name="asal_sekolah" class="form-control" placeholder="Contoh: TK Al-Ikhlas" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Upload Ijazah</label>
                                <input type="file" name="ijazah" class="form-control" accept=".pdf,.jpg,.png" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Foto Terbaru</label>
                                <input type="file" name="foto" class="form-control" accept="image/*" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Alamat Lengkap Domisili</label>
                            <textarea name="address" class="form-control" rows="3" placeholder="Nama jalan, RT/RW, Kecamatan, Kota" required></textarea>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow">
                                <i class="fas fa-paper-plane me-2"></i>Kirim Pendaftaran
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
