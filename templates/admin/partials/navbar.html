<nav class="main-header navbar navbar-expand navbar-white navbar-light">
  <ul class="navbar-nav">
    <li class="nav-item">
      <a class="nav-link" data-widget="pushmenu" href="#" role="button">
        <i class="fas fa-bars"></i>
      </a>
    </li>
  </ul>

  <nav aria-label="breadcrumb" class="d-none d-md-flex align-items-center ml-2">
    <ol class="breadcrumb">
      <li class="breadcrumb-item">
        <a href="{% url 'dashboard' %}"><i class="fas fa-home"></i></a>
      </li>
      {% for crumb in breadcrumbs %}
        {% if crumb.url %}
          <li class="breadcrumb-item">
            <a href="{{ crumb.url }}">{{ crumb.name }}</a>
          </li>
        {% else %}
          <li class="breadcrumb-item active" aria-current="page">
            {{ crumb.name }}
          </li>
        {% endif %}
      {% endfor %}
    </ol>
  </nav>

  <ul class="navbar-nav ml-auto">
    <li class="nav-item dropdown">
      <a class="nav-link d-flex align-items-center" data-toggle="dropdown" href="#">
        <span class="mr-2 d-none d-lg-inline text-gray-600 small">{{ user.username }}</span>
        <i class="far fa-user-circle fa-lg"></i>
      </a>
      <div class="dropdown-menu dropdown-menu-right shadow-sm border-0">
        <a href="{% url 'accounts:profile' %}" class="dropdown-item">
          <i class="fas fa-user-cog mr-2 text-gray-400"></i> Profil Saya
        </a>
        <div class="dropdown-divider"></div>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="dropdown-item text-danger">
            <i class="fas fa-sign-out-alt mr-2"></i> Logout
          </button>
        </form>
      </div>
    </li>
  </ul>
</nav>
