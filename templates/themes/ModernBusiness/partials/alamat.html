<div class="container py-5">
    <div class="card border-0 shadow-lg overflow-hidden rounded-4">
        <div class="row g-0">
            <div class="col-lg-4 bg-primary bg-gradient text-white p-5 d-flex flex-column justify-content-center">
                <h3 class="fw-bolder mb-4">Hubungi Kami</h3>
                
                <div class="d-flex mb-3">
                    <div class="flex-shrink-0"><i class="bi bi-geo-alt-fill fs-4"></i></div>
                    <div class="ms-3">
                        <h6 class="mb-0 fw-bold">Alamat Sekolah</h6>
                        <p class="small mb-0 opacity-75">{{ school.address }}</p>
                    </div>
                </div>

                <div class="d-flex mb-3">
                    <div class="flex-shrink-0"><i class="bi bi-telephone-fill fs-4"></i></div>
                    <div class="ms-3">
                        <h6 class="mb-0 fw-bold">Telepon / WA</h6>
                        <p class="small mb-0 opacity-75">{{ school.phone|default:"-" }}</p>
                    </div>
                </div>

                <div class="d-flex mb-4">
                    <div class="flex-shrink-0"><i class="bi bi-envelope-fill fs-4"></i></div>
                    <div class="ms-3">
                        <h6 class="mb-0 fw-bold">Email Resmi</h6>
                        <p class="small mb-0 opacity-75">{{ school.email|default:"-" }}</p>
                    </div>
                </div>

                <hr class="opacity-25">
                
                <div class="mt-auto">
                    <a href="https://www.google.com/maps/search/?api=1&query={{ school.address|urlencode }}" 
                       target="_blank" 
                       class="btn btn-light btn-sm rounded-pill px-4 fw-bold shadow-sm">
                        <i class="bi bi-cursor-fill me-2"></i>Petunjuk Arah
                    </a>
                </div>
            </div>

            <div class="col-lg-8 p-0">
                <div class="position-relative h-100" style="min-height: 450px;">
                    <iframe 
                        class="position-absolute top-0 start-0 w-100 h-100"
                        style="border:0; filter: grayscale(20%) contrast(1.2);" 
                        src="{{ school.google_maps_url }}" 
                        allowfullscreen="" 
                        loading="lazy">
                    </iframe>
                </div>
            </div>
        </div>
    </div>
</div>
