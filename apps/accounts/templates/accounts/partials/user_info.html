{% load static %}
{% if user.is_authenticated %}
    <div class="user-panel mt-3 pb-3 mb-3 d-flex align-items-center">
        <div class="image">
            <img src="{% static 'img/gurulaki.jpg' %}" 
                 class="elevation-2" 
                 alt="User Image"
                 style="width: 50px; /* Ukuran foto naik dari 40px ke 50px */
                        height: 50px; 
                        object-fit: cover; 
                        border-radius: 10px; 
                        border: 2px solid rgba(255,255,255,0.2);">
        </div>
        <div class="info ml-3"> <a href="{% url 'accounts:profile' %}" class="d-block" 
               style="font-size: 1.1rem; /* Ukuran font naik */
                      font-weight: 600; /* Lebih tebal */
                      line-height: 1.1;
                      color: #fff;">
                {{ profile.nama_lengkap|default:user.username }}
            </a>
            <span class="badge badge-info mt-1 d-inline-flex align-items-center" 
      style="font-size: 12px; 
             padding: 4px 10px; 
             letter-spacing: 0.5px;
             border-radius: 50px;"> <i class="fas fa-circle mr-2" 
       style="font-size: 8px; 
              color: #28a745; 
              text-shadow: 0 0 8px #28a745, 0 0 12px #ffffff;"></i> 
    
    {{ user.role|upper }}
</span>
        </div>
    </div>
{% endif %}
